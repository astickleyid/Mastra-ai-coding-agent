<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Personal Desktop Sandbox</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        margin: 0;
      }
      #messages {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
        border-bottom: 1px solid #ccc;
      }
      #input-area {
        display: flex;
        padding: 10px;
      }
      #input {
        flex-grow: 1;
        border: 1px solid #ccc;
        border-radius: 5px;
        padding: 5px;
      }
      #send {
        margin-left: 10px;
        padding: 5px 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="input" placeholder="Type your message..." />
      <button id="send">Send</button>
    </div>
    <script>
      const messages = document.getElementById('messages');
      const input = document.getElementById('input');
      const send = document.getElementById('send');

      let agentMessageElement;

      send.addEventListener('click', async () => {
        const message = input.value;
        if (message) {
          const messageElement = document.createElement('div');
          messageElement.textContent = `You: ${message}`;
          messages.appendChild(messageElement);
          input.value = '';

          agentMessageElement = document.createElement('div');
          agentMessageElement.textContent = 'Agent: ';
          messages.appendChild(agentMessageElement);

          window.electronAPI.runAgent(message);
        }
      });

      window.electronAPI.onAgentResponse((response) => {
        if (agentMessageElement) {
          agentMessageElement.textContent += response;
        }
      });
    </script>
  </body>
</html>
